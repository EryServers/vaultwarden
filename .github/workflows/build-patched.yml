name: Build patched image

on:
  push:
    branches:
      - patch/allow-manager-create-collections
    tags:
      - 'patched-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to apply (optional, e.g. 1.35.5-patched)'
        required: false
        default: ''

concurrency:
  group: build-patched-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push (debian / linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/vaultwarden

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest-patched,enable={{is_default_branch}}
            type=raw,value=latest-patched,enable=${{ github.ref == 'refs/heads/patch/allow-manager-create-collections' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.debian
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DB=sqlite,mysql,postgresql
